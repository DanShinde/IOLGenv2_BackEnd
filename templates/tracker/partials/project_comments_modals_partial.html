{% for comment in comments %}
    {% if request.user == comment.added_by or request.user.is_staff %}
    <div class="modal fade" id="editNoteModal{{ comment.id }}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Note</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="{% url 'edit_project_comment' comment.id %}" method="POST">
                    {% csrf_token %}
                    <div class="modal-body">
                        <textarea name="note_text" class="form-control" rows="4" required>{{ comment.text }}</textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    {% endif %}
{% endfor %}
